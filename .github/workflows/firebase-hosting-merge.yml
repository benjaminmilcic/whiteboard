# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
#
# Angepasst: statt FirebaseExtended/action-hosting-deploy wird der Hosting-Deploy
# direkt über die Firebase-CLI ausgeführt und per nick-fields/retry auf Job-Ebene
# bis zu 3x komplett wiederholt. Grund: Bei wackliger Verbindung bricht die
# Verbindung nach dem Release ab ("premature close"), die CLI macht intern einen
# nicht-idempotenten Retry und scheitert dann mit 400 "is the current active
# version", obwohl der Deploy bereits live ist. Ein vollständiger Neuversuch lädt
# eine neue Version hoch und vermeidet diese Kollision.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps && npm run build

      # Service-Account-JSON (Secret) für Application Default Credentials ablegen.
      - name: Firebase Service-Account schreiben
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WHITEBOARD_32486 }}
        run: printf '%s' "$FIREBASE_SA" > "${{ runner.temp }}/firebase-sa.json"

      - name: Deploy zu Firebase Hosting (live) mit Retry
        uses: nick-fields/retry@v3
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 20
          command: npx -y firebase-tools@latest deploy --only hosting --project whiteboard-32486 --non-interactive --force

      - name: Service-Account-JSON aufräumen
        if: always()
        run: rm -f "${{ runner.temp }}/firebase-sa.json"
