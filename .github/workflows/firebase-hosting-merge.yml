name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci --legacy-peer-deps && npm run build
      - name: Deploy Database Rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WHITEBOARD_32486 }}' > /tmp/gcp-key.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json npx firebase-tools@latest deploy --only database --project whiteboard-32486
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WHITEBOARD_32486 }}
          channelId: live
          projectId: whiteboard-32486
