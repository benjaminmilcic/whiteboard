<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="72" fill="url(#bg)"/>
  <!-- gefächerte Karten -->
  <g stroke="#ffffff" stroke-width="10">
    <rect x="120" y="150" width="150" height="210" rx="22" fill="#3b82f6" transform="rotate(-16 195 255)"/>
    <rect x="180" y="135" width="150" height="210" rx="22" fill="#22c55e" transform="rotate(-4 255 240)"/>
    <rect x="245" y="150" width="150" height="210" rx="22" fill="#facc15" transform="rotate(10 320 255)"/>
  </g>
  <!-- weißes Oval + UNO-Schriftzug auf der vorderen Karte -->
