<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1f6"/>
      <stop offset="1" stop-color="#ffd9e6"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7b73"/>
      <stop offset="1" stop-color="#ef4d44"/>
    </linearGradient>
    <linearGradient id="org" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb24d"/>
      <stop offset="1" stop-color="#fb8c00"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86d98a"/>
      <stop offset="1" stop-color="#54bd6a"/>
    </linearGradient>
    <linearGradient id="blu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#74b8ff"/>
      <stop offset="1" stop-color="#3d8bf5"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#7a2444" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="60" fill="url(#bg)"/>

  <g filter="url(#soft)" font-family="'Baloo 2', Arial, sans-serif" font-weight="800"
     text-anchor="middle" fill="#ffffff">
    <!-- A (rot) -->
    <g transform="rotate(-6 182 182)">
      <rect x="116" y="116" width="132" height="132" rx="28" fill="url(#red)"/>
      <text x="182" y="212" font-size="92">A</text>
    </g>
    <!-- B (orange) -->
    <g transform="rotate(5 330 182)">
      <rect x="264" y="116" width="132" height="132" rx="28" fill="url(#org)"/>
      <text x="330" y="212" font-size="92">B</text>
    </g>
    <!-- C (grün) -->
    <g transform="rotate(4 182 330)">
      <rect x="116" y="264" width="132" height="132" rx="28" fill="url(#grn)"/>
      <text x="182" y="360" font-size="92">C</text>
    </g>
    <!-- ? (blau) -->
    <g transform="rotate(-5 330 330)">
      <rect x="264" y="264" width="132" height="132" rx="28" fill="url(#blu)"/>
      <text x="330" y="360" font-size="96">?</text>
    </g>
  </g>
</svg>
