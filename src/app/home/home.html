<main
  class="relative min-h-dvh w-full bg-gradient-to-b from-sky-300 via-sky-400 to-indigo-500
         flex flex-col items-center justify-start sm:justify-center gap-8 px-4
         pt-16 pb-10 sm:py-10"
>
  <!-- Sprachleiste oben rechts -->
  <app-language-switcher class="absolute top-3 right-3 z-10" />

  <h1 class="text-4xl sm:text-5xl font-extrabold text-white drop-shadow-lg text-center">
    {{ 'home.title' | transloco }}
  </h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-6xl">
    <!-- Whiteboard -->
    <button
      type="button"
      (click)="go('whiteboard')"
      class="flex-1 bg-white/95 rounded-[2rem] shadow-2xl p-6 flex flex-col items-center gap-4
             hover:scale-105 active:scale-95 transition focus:outline-none focus:ring-4 focus:ring-white"
    >
      <img
        src="/icon-512.png"
        [alt]="'home.whiteboardSub' | transloco"
        class="w-40 h-40 sm:w-48 sm:h-48 rounded-[1.6rem] shadow-lg"
      />
      <span class="text-2xl sm:text-3xl font-extrabold text-slate-700">{{ 'home.whiteboard' | transloco }}</span>
      <span class="text-base text-slate-500 -mt-2">{{ 'home.whiteboardSub' | transloco }}</span>
    </button>

    <!-- Schiffe versenken -->
    <button
      type="button"
      (click)="go('schiffe')"
      class="flex-1 bg-white/95 rounded-[2rem] shadow-2xl p-6 flex flex-col items-center gap-4
             hover:scale-105 active:scale-95 transition focus:outline-none focus:ring-4 focus:ring-white"
    >
      <img
        src="/schiffe-icon-512.png"
        [alt]="'home.schiffeSub' | transloco"
        class="w-40 h-40 sm:w-48 sm:h-48 rounded-[1.6rem] shadow-lg"
      />
      <span class="text-2xl sm:text-3xl font-extrabold text-slate-700">{{ 'home.schiffe' | transloco }}</span>
      <span class="text-base text-slate-500 -mt-2">{{ 'home.schiffeSub' | transloco }}</span>
    </button>

    <!-- Memory -->
    <button
      type="button"
      (click)="go('memory')"
      class="flex-1 bg-white/95 rounded-[2rem] shadow-2xl p-6 flex flex-col items-center gap-4
             hover:scale-105 active:scale-95 transition focus:outline-none focus:ring-4 focus:ring-white"
    >
      <img
        src="/memory-icon-512.png"
        [alt]="'home.memory' | transloco"
        class="w-40 h-40 sm:w-48 sm:h-48 rounded-[1.6rem] shadow-lg"
      />
      <span class="text-2xl sm:text-3xl font-extrabold text-slate-700">{{ 'home.memory' | transloco }}</span>
      <span class="text-base text-slate-500 -mt-2">{{ 'home.memorySub' | transloco }}</span>
    </button>

    <!-- Vier gewinnt -->
    <button
      type="button"
      (click)="go('connect4')"
      class="flex-1 bg-white/95 rounded-[2rem] shadow-2xl p-6 flex flex-col items-center gap-4
             hover:scale-105 active:scale-95 transition focus:outline-none focus:ring-4 focus:ring-white"
    >
      <img
        src="/connect4-icon.svg"
        [alt]="'home.connect4' | transloco"
        class="w-40 h-40 sm:w-48 sm:h-48 rounded-[1.6rem] shadow-lg"
      />
      <span class="text-2xl sm:text-3xl font-extrabold text-slate-700">{{ 'home.connect4' | transloco }}</span>
      <span class="text-base text-slate-500 -mt-2">{{ 'home.connect4Sub' | transloco }}</span>
    </button>

    <!-- Backgammon -->
    <button
      type="button"
      (click)="go('backgammon')"
      class="flex-1 bg-white/95 rounded-[2rem] shadow-2xl p-6 flex flex-col items-center gap-4
             hover:scale-105 active:scale-95 transition focus:outline-none focus:ring-4 focus:ring-white"
    >
      <img
        src="/backgammon-icon.svg"
        [alt]="'home.backgammon' | transloco"
        class="w-40 h-40 sm:w-48 sm:h-48 rounded-[1.6rem] shadow-lg"
      />
      <span class="text-2xl sm:text-3xl font-extrabold text-slate-700">{{ 'home.backgammon' | transloco }}</span>
      <span class="text-base text-slate-500 -mt-2">{{ 'home.backgammonSub' | transloco }}</span>
    </button>

    <!-- Dame -->
    <button
      type="button"
      (click)="go('dame')"
      class="flex-1 bg-white/95 rounded-[2rem] shadow-2xl p-6 flex flex-col items-center gap-4
             hover:scale-105 active:scale-95 transition focus:outline-none focus:ring-4 focus:ring-white"
    >
      <img
        src="/dame-icon.svg"
        [alt]="'home.dame' | transloco"
        class="w-40 h-40 sm:w-48 sm:h-48 rounded-[1.6rem] shadow-lg"
      />
      <span class="text-2xl sm:text-3xl font-extrabold text-slate-700">{{ 'home.dame' | transloco }}</span>
      <span class="text-base text-slate-500 -mt-2">{{ 'home.dameSub' | transloco }}</span>
    </button>

    <!-- Slagalica (Puzzle) -->
    <button
      type="button"
      (click)="go('puzzle')"
      class="flex-1 bg-white/95 rounded-[2rem] shadow-2xl p-6 flex flex-col items-center gap-4
             hover:scale-105 active:scale-95 transition focus:outline-none focus:ring-4 focus:ring-white"
    >
      <img
        src="/puzzle-icon.svg"
        [alt]="'home.puzzle' | transloco"
        class="w-40 h-40 sm:w-48 sm:h-48 rounded-[1.6rem] shadow-lg"
      />
      <span class="text-2xl sm:text-3xl font-extrabold text-slate-700">{{ 'home.puzzle' | transloco }}</span>
      <span class="text-base text-slate-500 -mt-2">{{ 'home.puzzleSub' | transloco }}</span>
    </button>

    <!-- Pogodi riječ (Galgenmännchen) -->
    <button
      type="button"
      (click)="go('hangman')"
      class="flex-1 bg-white/95 rounded-[2rem] shadow-2xl p-6 flex flex-col items-center gap-4
             hover:scale-105 active:scale-95 transition focus:outline-none focus:ring-4 focus:ring-white"
    >
      <img
        src="/hangman-icon.svg"
        [alt]="'home.hangman' | transloco"
        class="w-40 h-40 sm:w-48 sm:h-48 rounded-[1.6rem] shadow-lg"
      />
      <span class="text-2xl sm:text-3xl font-extrabold text-slate-700">{{ 'home.hangman' | transloco }}</span>
      <span class="text-base text-slate-500 -mt-2">{{ 'home.hangmanSub' | transloco }}</span>
    </button>
  </div>
</main>
