<div class="h-screen flex flex-col bg-gray-100">
  <!-- Toolbar -->
  <mat-toolbar class="bg-white shadow-md" style="height: auto; min-height: 64px;">
    <div class="flex flex-wrap items-center justify-between w-full gap-4 py-2">
      <!-- Farben -->
      <div class="flex flex-wrap items-center gap-2">
        <div class="flex flex-wrap gap-2">
          @for (color of colors; track color) {
            <button
              (click)="selectColor(color)"
              [class.ring-4]="selectedColor() === color"
              [class.ring-blue-500]="selectedColor() === color"
              [style.background-color]="color"
              class="w-10 h-10 rounded-full border-2 border-gray-300 cursor-pointer hover:scale-110 transition-transform"
              [attr.aria-label]="'Farbe ' + color">
            </button>
          }
        </div>
      </div>

      <!-- Strichstärke -->
      <mat-form-field appearance="outline" subscriptSizing="dynamic" style="width: 110px;">
        <mat-select [value]="lineWidth()" (selectionChange)="lineWidth.set($event.value)">
          <mat-select-trigger>
            <div class="flex items-center h-full">
              <div [style.height.px]="lineWidth()" style="width: 48px; background: black; border-radius: 9999px;"></div>
            </div>
          </mat-select-trigger>
          @for (width of lineWidths; track width) {
            <mat-option [value]="width">
              <div class="flex items-center h-full">
                <div [style.height.px]="width" style="width: 48px; background: black; border-radius: 9999px;"></div>
              </div>
            </mat-option>
          }
        </mat-select>
      </mat-form-field>

      <!-- Löschen-Button -->
      <button
        mat-mini-fab
        color="warn"
        (click)="clearCanvas()"
        class="ml-auto">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </mat-toolbar>

  <!-- Canvas-Container -->
  <div class="flex-1 relative overflow-hidden">
    <canvas
      #canvas
      (mousedown)="onMouseDown($event)"
      (mousemove)="onMouseMove($event)"
      (mouseup)="onMouseUp()"
      (mouseleave)="onMouseUp()"
      class="absolute inset-0 bg-white cursor-crosshair touch-none">
    </canvas>
  </div>

  <!-- Status-Anzeige -->
  @if (isDrawing()) {
    <div class="absolute bottom-4 left-4 bg-blue-500 text-white px-4 py-2 rounded-lg shadow-lg">
      Zeichnen...
    </div>
  }
</div>
