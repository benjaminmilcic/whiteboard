<div class="w-full max-w-md mx-auto">
  <h1 class="text-4xl sm:text-5xl font-extrabold text-center text-white drop-shadow mb-1">
    ⚓ {{ 'lobby.title' | transloco }}
  </h1>
  <p class="text-center text-sky-100 mb-6">{{ 'lobby.subtitle' | transloco }}</p>

  <div class="bg-white/95 rounded-3xl shadow-xl p-5 sm:p-6 space-y-5">
    <!-- Name -->
    <div>
      <label class="block font-bold mb-1 text-slate-700">{{ 'lobby.nameLabel' | transloco }}</label>
      <input
        [(ngModel)]="name"
        maxlength="12"
        [placeholder]="'lobby.namePlaceholder' | transloco"
        class="w-full rounded-xl border-2 border-sky-200 px-4 py-3 text-lg
               focus:border-ozean focus:outline-none"
      />
      @if (!name().trim()) {
        <p class="text-sm text-slate-400 mt-1">{{ 'lobby.nameHint' | transloco }}</p>
      }
    </div>

    <!-- Avatar -->
    <div>
      <label class="block font-bold mb-2 text-slate-700">{{ 'lobby.chooseAnimal' | transloco }}</label>
      <div class="grid grid-cols-5 gap-2">
        @for (a of avatars; track a) {
          <button
            type="button"
            (click)="emoji.set(a)"
            [class]="emoji() === a
              ? 'bg-ozean ring-4 ring-ozean/40 scale-110'
              : 'bg-sky-100 hover:bg-sky-200'"
            class="aspect-square rounded-2xl text-2xl flex items-center justify-center transition"
          >
            {{ a }}
          </button>
        }
      </div>
    </div>

    @if (game.error()) {
      <p class="bg-rose-100 text-rose-700 rounded-xl px-4 py-2 text-center font-semibold">
        {{ game.error() }}
      </p>
    }

    <!-- Neues Spiel -->
    <button
      type="button"
      (click)="create()"
      [disabled]="game.busy() || !name().trim()"
      class="w-full bg-emerald-500 hover:bg-emerald-600 disabled:opacity-50
             text-white text-xl font-bold rounded-2xl py-4 shadow active:scale-95 transition"
    >
      {{ 'lobby.newGame' | transloco }}
    </button>

    <div class="flex items-center gap-3 text-slate-400">
      <span class="flex-1 h-px bg-slate-200"></span>
      <span class="font-bold">{{ 'lobby.or' | transloco }}</span>
      <span class="flex-1 h-px bg-slate-200"></span>
    </div>

    <!-- Beitreten -->
    <div class="space-y-2">
      <label class="block font-bold text-slate-700">{{ 'lobby.joinLabel' | transloco }}</label>
      <input
        [(ngModel)]="code"
        (ngModelChange)="code.set($event.replace(/\D/g, '').slice(0, 4))"
        maxlength="4"
        inputmode="numeric"
        [placeholder]="'lobby.codePlaceholder' | transloco"
        class="w-full rounded-xl border-2 border-sky-200 px-4 py-3 text-2xl
               tracking-[0.4em] text-center font-extrabold
               focus:border-ozean focus:outline-none"
      />
      <button
        type="button"
        (click)="join()"
        [disabled]="game.busy() || !name().trim() || code().length !== 4"
        class="w-full bg-ozean hover:bg-ozean-deep disabled:opacity-50
               text-white text-xl font-bold rounded-2xl py-4 shadow active:scale-95 transition"
      >
        {{ 'lobby.join' | transloco }}
      </button>
    </div>
  </div>
</div>
