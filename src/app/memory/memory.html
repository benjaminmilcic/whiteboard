<main
  class="min-h-dvh w-full bg-gradient-to-b from-sky-300 via-sky-400 to-indigo-500
         flex flex-col overflow-x-hidden"
>
  <!-- Buttonleiste (wie bei Schiffe): Spiel beenden · Sprachen · Hauptmenü -->
  <header class="w-full flex justify-end items-center gap-4 px-3 pt-3 shrink-0">
    <!-- Spiel beenden – nur während eines laufenden Spiels (sonst wäre er sinnlos) -->
    @if (game()) {
      <button
        type="button"
        (click)="endGame()"
        class="bg-rose-400 hover:bg-rose-500 text-white text-base font-extrabold
               rounded-full px-4 py-2 shadow-lg active:scale-95 transition shrink-0"
      >
        {{ 'memory.endGame' | transloco }}
      </button>
    }
    <app-language-switcher />
    <!-- Zurück zur Start-Auswahl -->
    <button
      type="button"
      (click)="goHome()"
      title="Natrag na izbornik"
      aria-label="Natrag na izbornik"
      class="w-12 h-12 rounded-full overflow-hidden ring-2 ring-white shadow-lg
             bg-white/40 hover:scale-110 active:scale-95 transition shrink-0"
    >
      <img src="/familie.jpg" alt="Natrag na izbornik" class="w-full h-full object-cover" />
    </button>
  </header>

  <!-- Memory-Oberfläche unter der Buttonleiste -->
  <div class="flex-1 w-full min-h-0">
    @if (game()) {
      <app-board />
    } @else {
      <app-home />
    }
  </div>
</main>
